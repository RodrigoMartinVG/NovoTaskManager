<!DOCTYPE html>
<html lang="es-AR" data-theme="noche">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasker Cat</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <script async defer src="https://accounts.google.com/gsi/client"></script>
  <script>
    // Apply saved theme + density before first paint to avoid flash
    const t = localStorage.getItem('oda-theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
    const d = localStorage.getItem('oda-density');
    if (d) document.documentElement.setAttribute('data-density', d);
  </script>
</head>
<body>
  <app-shell></app-shell>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
