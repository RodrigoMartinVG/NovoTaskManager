<html lang="es"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alternativas Disruptivas - Cuero + Metal</title>
  <style>
    :root{
      --bg:#16110f;
      --bg2:#251c18;
      --card:#f3ece3;
      --ink:#1d1715;
      --muted:#6e6258;
      --border:#cfb89e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      padding:28px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,210,120,.10), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.05), transparent 14%),
        radial-gradient(circle at 70% 85%, rgba(120,180,255,.07), transparent 22%),
        linear-gradient(180deg,var(--bg2),var(--bg));
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
    }
    .shell{
      max-width:1520px;
      margin:0 auto;
      background:linear-gradient(180deg,#fbf6ee,#efe6d8);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 28px 90px rgba(0,0,0,.46);
    }
    .header{
      padding:18px 24px 14px;
      text-align:center;
      background:linear-gradient(180deg,#4a342b,#241913);
      color:#f7efe4;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .header h1{
      margin:0;
      font-size:28px;
      letter-spacing:.3px;
    }
    .header p{
      margin:8px 0 0;
      color:#dac8b4;
      font-size:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:18px;
      padding:22px;
    }
    .card{
      background:linear-gradient(180deg,#fff9f0,#f2e8dc);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85);
      position:relative;
      overflow:hidden;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:auto -20% -30% auto;
      width:140px;
      height:140px;
      background:radial-gradient(circle, rgba(0,0,0,.05), transparent 60%);
      transform:rotate(25deg);
      pointer-events:none;
    }
    .svgbox{
      width:100%;
      aspect-ratio:1/1;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    svg{width:100%; height:100%; overflow:visible}
    .caption{
      margin-top:10px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.85px;
      text-transform:uppercase;
    }
    .footer{
      padding:15px 22px 18px;
      text-align:center;
      background:linear-gradient(180deg,#efe4d4,#e7dac8);
      color:#6d5f54;
      border-top:1px solid #d7c6b1;
      font-size:13px;
    }
    @media (max-width: 1220px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width: 700px){
      body{padding:12px}
      .grid{grid-template-columns:1fr}
      .header h1{font-size:22px}
    }
  </style>
</head>
<body>
